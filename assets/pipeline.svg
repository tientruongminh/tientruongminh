<svg width="1200" height="260" viewBox="0 0 1200 260" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs><style>.bg{fill:#020617}.box{fill:#07111f;stroke:#164e63;stroke-width:1}.t{font:700 18px ui-sans-serif,system-ui;fill:#e5e7eb}.s{font:500 12px ui-monospace,monospace;fill:#99f6e4}.line{stroke:#34d399;stroke-width:3;stroke-linecap:round;stroke-dasharray:12 16;animation:flow 12s linear infinite}.dot{fill:#34d399;animation:pulse 2s ease-in-out infinite}.halo{fill:#34d399;opacity:.1;animation:halo 2s ease-in-out infinite}@keyframes flow{to{stroke-dashoffset:-260}}@keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}@keyframes halo{0%,100%{r:8;opacity:.08}50%{r:22;opacity:.22}}</style></defs>
<rect class="bg" width="1200" height="260" rx="28"/>
<path class="line" d="M120 132H1080"/>
<g transform="translate(40 78)"><rect class="box" width="160" height="108" rx="22"/><text class="t" x="28" y="44">CSI Nodes</text><text class="s" x="28" y="72">ESP32-S3 x4</text><circle class="halo" cx="130" cy="30" r="12"/><circle class="dot" cx="130" cy="30" r="6"/></g>
<g transform="translate(250 78)"><rect class="box" width="160" height="108" rx="22"/><text class="t" x="26" y="44">Gateway</text><text class="s" x="26" y="72">Rust / Tokio</text><circle class="halo" cx="130" cy="30" r="12"/><circle class="dot" cx="130" cy="30" r="6" style="animation-delay:.3s"/></g>
<g transform="translate(460 78)"><rect class="box" width="160" height="108" rx="22"/><text class="t" x="34" y="44">Data Lake</text><text class="s" x="34" y="72">Bronze/Silver/Gold</text><circle class="halo" cx="130" cy="30" r="12"/><circle class="dot" cx="130" cy="30" r="6" style="animation-delay:.6s"/></g>
<g transform="translate(670 78)"><rect class="box" width="160" height="108" rx="22"/><text class="t" x="32" y="44">Training</text><text class="s" x="32" y="72">Helios GH200</text><circle class="halo" cx="130" cy="30" r="12"/><circle class="dot" cx="130" cy="30" r="6" style="animation-delay:.9s"/></g>
<g transform="translate(880 78)"><rect class="box" width="160" height="108" rx="22"/><text class="t" x="36" y="44">Serving</text><text class="s" x="36" y="72">ONNX / Triton</text><circle class="halo" cx="130" cy="30" r="12"/><circle class="dot" cx="130" cy="30" r="6" style="animation-delay:1.2s"/></g>
</svg>
