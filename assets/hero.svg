<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360"><stop stop-color="#020617"/><stop offset="0.45" stop-color="#064e3b"/><stop offset="1" stop-color="#0f172a"/></linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%"><stop stop-color="#34d399" stop-opacity="0.9"/><stop offset="1" stop-color="#34d399" stop-opacity="0"/></radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="28"/></filter>
    <style>
      .grid{stroke:#5eead4;stroke-opacity:.12}.title{font:700 58px ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;fill:#f8fafc;letter-spacing:-2px}.sub{font:500 20px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#ccfbf1}.small{font:600 13px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#99f6e4}.node{fill:#34d399}.line{stroke:#34d399;stroke-width:2;stroke-linecap:round}.pulse{animation:pulse 2.4s ease-in-out infinite}.float{animation:float 6s ease-in-out infinite}.dash{stroke-dasharray:10 14;animation:dash 18s linear infinite}.scan{animation:scan 4s ease-in-out infinite}.blink{animation:blink 1.4s ease-in-out infinite}@keyframes pulse{0%,100%{opacity:.35;r:5}50%{opacity:1;r:9}}@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}@keyframes dash{to{stroke-dashoffset:-240}}@keyframes scan{0%,100%{transform:translateX(-180px);opacity:0}15%,80%{opacity:.35}50%{opacity:.8}100%{transform:translateX(1020px);opacity:0}}@keyframes blink{0%,45%,100%{opacity:.3}55%{opacity:1}}
    </style>
  </defs>
  <rect width="1200" height="360" rx="34" fill="url(#bg)"/>
  <g opacity=".65">
    <path class="grid" d="M0 60H1200M0 120H1200M0 180H1200M0 240H1200M0 300H1200M120 0V360M240 0V360M360 0V360M480 0V360M600 0V360M720 0V360M840 0V360M960 0V360M1080 0V360"/>
  </g>
  <circle class="float" cx="980" cy="92" r="110" fill="url(#glow)" filter="url(#blur)" opacity=".45"/>
  <circle class="float" cx="250" cy="280" r="92" fill="#38bdf8" filter="url(#blur)" opacity=".18"/>
  <rect class="scan" x="120" y="0" width="80" height="360" fill="#5eead4" opacity=".3"/>
  <g transform="translate(70 82)">
    <text class="small" x="0" y="0">HCMUS DATA SCIENCE / YEAR 3</text>
    <text class="title" x="0" y="74">Tien Truong Minh</text>
    <text class="sub" x="4" y="122">AI Engineering at Amoiq · agents · RF sensing · ML platforms</text>
    <g transform="translate(4 166)">
      <rect width="188" height="34" rx="17" fill="#022c22" stroke="#34d399" stroke-opacity=".45"/><text class="small" x="18" y="22">AI SYSTEMS BUILDER</text>
      <rect x="205" width="138" height="34" rx="17" fill="#082f49" stroke="#38bdf8" stroke-opacity=".45"/><text class="small" x="223" y="22">RF-WORLDPOSE</text>
      <rect x="360" width="116" height="34" rx="17" fill="#2e1065" stroke="#a78bfa" stroke-opacity=".45"/><text class="small" x="378" y="22">AGENT TOOLS</text>
    </g>
  </g>
  <g transform="translate(780 118)">
    <path class="line dash" d="M70 30C130 0 210 0 270 48C330 96 370 96 420 70" opacity=".75"/>
    <path class="line dash" d="M30 128C90 88 160 90 220 132C276 172 350 170 430 122" opacity=".55"/>
    <circle class="node pulse" cx="70" cy="30" r="6"/><circle class="node pulse" cx="270" cy="48" r="6" style="animation-delay:.4s"/><circle class="node pulse" cx="420" cy="70" r="6" style="animation-delay:.8s"/>
    <circle class="node pulse" cx="30" cy="128" r="6" style="animation-delay:1s"/><circle class="node pulse" cx="220" cy="132" r="6" style="animation-delay:1.3s"/><circle class="node pulse" cx="430" cy="122" r="6" style="animation-delay:1.6s"/>
    <text class="small blink" x="104" y="190">live graph · search · train · deploy</text>
  </g>
</svg>
